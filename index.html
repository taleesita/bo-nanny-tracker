// ====== HELPERS ======
// Payment weeks run Sat-Fri: weekend work belongs to the NEXT Mon-Fri week
// getMon returns the Saturday that starts the payment week
function getMon(dt) {
  var d = new Date(dt); var day = d.getDay();
  // day: 0=Sun,1=Mon,...,5=Fri,6=Sat
  // daysSinceSat: Sat=0, Sun=1, Mon=2, Tue=3, Wed=4, Thu=5, Fri=6
  var diff = (day + 1) % 7;
  d.setDate(d.getDate() - diff);
  d.setHours(0,0,0,0); return d;
}
function ds(dt) { return dt.toISOString().split('T')[0]; }

var DAYNAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var DAYLONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// "Mon 4/6" format
function fmtCard(s) {
  var dt = new Date(s + 'T12:00:00');
  return DAYLONG[dt.getDay()] + ', ' + (dt.getMonth()+1) + '/' + dt.getDate();
}
// "4/6" compact
function fmtShort(s) {
  var p = s.split('-');
  return (+p[1]) + '/' + parseInt(p[2]);
}
// "Fri, 3/27" for payment history
function fmtPayDate(s) {
  var dt = new Date(s + 'T12:00:00');
  return DAYNAMES[dt.getDay()] + ' ' + (dt.getMonth()+1) + '/' + dt.getDate() + '/' + dt.getFullYear().toString().slice(2);
}

function fmtTime(t) {
  if (!t) return '';
  var parts = t.split(':');
  var h = parseInt(parts[0]), m = parseInt(parts[1]);
  var ampm = h >= 12 ? 'pm' : 'am';
  h = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  if (m > 0) return h + ':' + (m < 10 ? '0' : '') + m + ampm;
  return h + ampm;
}
function fmtHours(dy) {
  if (!dy.s && !dy.e) return '';
  return fmtTime(dy.s) + '\u2013' + fmtTime(dy.e) + ' (' + dy.h + 'h)';
}
function fmtWeekRange(sat) {
  // sat is the Saturday start; show Mon-Fri range
  var m = new Date(sat); m.setDate(m.getDate() + 2); // Monday
  var f = new Date(sat); f.setDate(f.getDate() + 6); // Friday
  return fmtShort(ds(m)) + ' \u2013 ' + fmtShort(ds(f)) + ', ' + f.getFullYear();
}
function getMonFromSat(sat) {
  var m = new Date(sat); m.setDate(m.getDate() + 2); return m;
}
function fmt$(amt) { return '$' + amt.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function fmt$int(amt) { return '$' + Math.round(amt).toLocaleString(); }

function calcHours(start, end) {
  if (!start || !end) return 0;
  var s = start.split(':'), e = end.split(':');
  var sh = parseInt(s[0]) + parseInt(s[1]) / 60;
  var eh = parseInt(e[0]) + parseInt(e[1]) / 60;
  var diff = eh - sh;
  return Math.round(diff * 4) / 4; // quarter-hour precision
}

function isAuto(catKey) { var c = CATS[catKey]; return c && c.calc === 'auto'; }
function catLabel(key) { var c = CATS[key]; return c ? c.label : key; }
function catColor(key) { var c = CATS[key]; return c ? c.color : 'bg-gray-100 text-gray-700'; }

function dayTotal(dy) {
  if (!dy || dy.st === '') return 0;
  if (isAuto(dy.c)) return RATE * (DHRS[dy.w] || 8);
  return RATE * (dy.h || 0) + (dy.a || 0);
}

function findDay(date) { return days.find(function(x) { return x.d === date; }); }
function ensure(date, dow) {
  var dy = findDay(date);
  if (!dy) {
    var isWknd = (dow === 'Sat' || dow === 'Sun');
    dy = {d:date, w:dow, s:'', e:'', h:0, a:0, n:'', c: isWknd ? '' : 'regular', st:'', pd:null};
    days.push(dy);
  }
  return dy;
}
function unpaidTotal() { var t = 0; days.forEach(function(d) { if (d.st === 'unpaid') t += dayTotal(d); }); return t; }
function paidTotal() { var t = 0; pmts.forEach(function(p) { t += p.amt; }); return t; }
// Calculate running credit: overpayments >= $100 add credit (rounded to $100),
// underpayments consume credit. Processed chronologically.
function getCredits() {
  var credit = 0;
  var sorted = pmts.slice().sort(function(a, b) { return a.dt.localeCompare(b.dt); });
  sorted.forEach(function(p) {
    var covered = 0;
    var pWeeks = {}; // track distinct weeks in this payment for parking
    days.forEach(function(d) {
      if (d.pd === p.dt) {
        covered += dayTotal(d);
        var dateStr = d.d.substring(0, 10); // strip -bonus suffix
        var dt = new Date(dateStr + 'T12:00:00');
        if (!isNaN(dt.getTime())) {
          var sat = ds(getMon(dt));
          if (weekHasParking(sat)) pWeeks[sat] = true;
        }
      }
    });
    // Subtract parking deductions from what was "owed"
    var parkingDed = Object.keys(pWeeks).length * PARKING_WEEKLY;
    var owed = covered - parkingDed;
    var diff = p.amt - owed;
    if (diff >= 100) {
      credit += Math.floor(diff / 100) * 100;
    } else if (diff < 0) {
      credit = Math.max(0, credit + diff); // underpayment uses credit
    }
  });
  return credit;
}
// Count distinct unpaid weeks eligible for parking deduction
function unpaidParkingWeeks() {
  var weeks = {};
  days.forEach(function(d) {
    if (d.st === 'unpaid') {
      var dateStr = d.d.substring(0, 10); // strip -bonus suffix
      var dt = new Date(dateStr + 'T12:00:00');
      if (!isNaN(dt.getTime())) {
        var sat = ds(getMon(dt));
        if (sat >= PARKING_START) weeks[sat] = true;
      }
    }
  });
  return Object.keys(weeks).length;
}
function totalParkingDeduction() {
  return unpaidParkingWeeks() * PARKING_WEEKLY;
}
// Check if a specific week (by its Saturday key) has parking
function weekHasParking(satKey) {
  return satKey >= PARKING_START;
}
// Balance = unpaid total minus parking deductions minus credits
function getBalance() {
  return unpaidTotal() - totalParkingDeduction() - getCredits();
}
function unpaidDays() { return days.filter(function(d) { return d.st === 'unpaid'; }); }

// Count days per payment date
function daysForPayment(pdt) {
  return days.filter(function(d) { return d.pd === pdt && d.st === 'paid'; }).length;
}

  h += statCard('Total Days', totalDays, 'bg-indigo-50 text-indigo-700');
  h += statCard('Total Paid', fmt$int(paidTotal()), 'bg-green-50 text-green-700');
  Object.keys(CATS).forEach(function(k) {
    if (catCounts[k]) h += statCard(CATS[k].label, catCounts[k] + ' days', catColor(k));
  });
  h += '</div>';

  // Build week groups
  var groups = {};
  days.forEach(function(d) {
    if (d.d.indexOf('-bonus') >= 0 || d.st === '') return;
    var mon = ds(getMon(new Date(d.d + 'T12:00:00')));
    if (!groups[mon]) groups[mon] = [];
    groups[mon].push(d);
  });

  // Build payment lookup: paymentDate -> {amt, days}
  var pmtByDate = {};
  pmts.forEach(function(p) { pmtByDate[p.dt] = p.amt; });

  // Match weeks to payments: find the payment associated with each week
  function weekPayment(wk) {
    // Find the most common pd (payment date) among the week's days
    var pdCounts = {};
    wk.forEach(function(d) {
      if (d.pd) pdCounts[d.pd] = (pdCounts[d.pd] || 0) + 1;
    });
    var bestPd = null, bestCount = 0;
    Object.keys(pdCounts).forEach(function(pd) {
      if (pdCounts[pd] > bestCount) { bestPd = pd; bestCount = pdCounts[pd]; }
    });
    if (bestPd && pmtByDate[bestPd]) return {dt: bestPd, amt: pmtByDate[bestPd]};
    return null;
  }

  // Group weeks by payment date (merge weeks sharing the same payment)
  var keys = Object.keys(groups).sort(); // chronological
  var blocks = []; // each block: {pmtDt, pmtAmt, weeks: [{key, days, tot}]}
  var pmtBlocks = {}; // pmtDt -> block index

  keys.forEach(function(k) {
    var wk = groups[k];
    var tot = 0; wk.forEach(function(d) { tot += dayTotal(d); });
    var pmt = weekPayment(wk);
    var allPaid = wk.every(function(d) { return d.st === 'paid'; });
    var monDt = new Date(k + 'T12:00:00'); monDt.setDate(monDt.getDate() + 2);
    var wkInfo = {key: k, days: wk, tot: tot, allPaid: allPaid, monLabel: fmtShort(ds(monDt))};

    if (pmt && pmtBlocks[pmt.dt] !== undefined) {
      // Add to existing payment block
      blocks[pmtBlocks[pmt.dt]].weeks.push(wkInfo);
    } else {
      var block = {pmtDt: pmt ? pmt.dt : null, pmtAmt: pmt ? pmt.amt : 0, weeks: [wkInfo]};
      if (pmt) pmtBlocks[pmt.dt] = blocks.length;
      blocks.push(block);
    }
  });

  blocks.reverse(); // most recent first
  h += '<div class="space-y-2">';
  blocks.forEach(function(block) {
    var totalDayCount = 0;
    var blockTotal = 0;
    var blockParking = 0;
    block.weeks.forEach(function(w) { totalDayCount += w.days.length; blockTotal += w.tot; if (weekHasParking(w.key)) blockParking += PARKING_WEEKLY; });
    var blockNet = blockTotal - blockParking;
    var allPaid = block.weeks.every(function(w) { return w.allPaid; });
    var multiWeek = block.weeks.length > 1;
    var blockId = block.weeks[0].key;

    // Header label: "Wk of 5/11" or "Wks of 4/27, 5/4, 5/11"
    var weekLabels = block.weeks.map(function(w) { return w.monLabel; });
    var headerLabel = (multiWeek ? 'Wks of ' : 'Wk of ') + weekLabels.join(', ');

    h += '<div class="bg-white rounded-lg shadow-sm overflow-hidden">';
    h += '<div class="px-4 py-2.5 flex justify-between items-center cursor-pointer hover:bg-indigo-50" onclick="toggleHist(\'' + blockId + '\')">';
    h += '<div class="flex items-center gap-2 flex-wrap">';
    h += '<span class="font-medium text-sm text-gray-800">' + headerLabel + '</span>';
    h += '<span class="text-xs text-gray-400">' + totalDayCount + ' days</span>';
    if (allPaid) {
      h += '<span class="chip bg-green-100 text-green-700">Paid</span>';
    } else {
      h += '<span class="chip bg-amber-100 text-amber-700">Unpaid</span>';
    }
    h += '</div>';
    // Right side: payment amount (what was handed over) or block net total
    h += '<div class="text-right">';
    if (block.pmtDt) {
      h += '<span class="font-bold text-sm text-indigo-600">' + fmt$(block.pmtAmt) + '</span>';
      h += '<span class="text-xs text-gray-400 ml-2">paid ' + fmtShort(block.pmtDt) + '</span>';
    } else {
      h += '<span class="font-medium text-sm text-indigo-600">' + fmt$(blockParking > 0 ? blockNet : blockTotal) + '</span>';
    }
    h += '</div></div>';

    // Expandable detail
    h += '<div id="hw-' + blockId + '" class="hidden border-t">';
    block.weeks.forEach(function(w, wi) {
      // Light week separator (except before first)
      if (wi > 0) {
        h += '<div class="px-4 py-1 bg-gray-50 border-t border-b border-gray-200">';
        h += '<span class="text-xs font-medium text-gray-400">Wk of ' + w.monLabel + '</span></div>';
      } else if (multiWeek) {
        h += '<div class="px-4 py-1 bg-gray-50 border-b border-gray-200">';
        h += '<span class="text-xs font-medium text-gray-400">Wk of ' + w.monLabel + '</span></div>';
      }
      w.days.forEach(function(d) {
        h += '<div class="px-4 py-1.5 flex justify-between items-center text-sm border-b border-gray-50">';
        h += '<div class="flex items-center gap-2"><span class="text-gray-600">' + fmtShort(d.d) + '</span>';
        if (d.c && CATS[d.c]) h += '<span class="chip ' + catColor(d.c) + '">' + catLabel(d.c) + '</span>';
        if (d.s && d.e) h += '<span class="text-xs text-gray-400">' + fmtTime(d.s) + '\u2013' + fmtTime(d.e) + '</span>';
        h += '</div><span class="font-medium text-indigo-600">' + fmt$(dayTotal(d)) + '</span></div>';
      });
    });
    // Subtotal + Payment footer
    if (block.pmtDt) {
      if (blockParking > 0) {
        h += '<div class="px-4 py-1.5 flex justify-between items-center text-sm bg-indigo-50 border-t border-indigo-100">';
        h += '<span class="text-indigo-600">Subtotal</span>';
        h += '<span class="font-medium text-indigo-600">' + fmt$(blockTotal) + '</span></div>';
        h += '<div class="px-4 py-1 flex justify-between items-center text-sm bg-indigo-50">';
        h += '<span class="text-indigo-500">Parking</span>';
        h += '<span class="text-red-500">-' + fmt$(blockParking) + '</span></div>';
        h += '<div class="px-4 py-1.5 flex justify-between items-center text-sm bg-indigo-50 border-t border-indigo-200">';
        h += '<span class="text-indigo-600 font-medium">Total Due</span>';
        h += '<span class="font-bold text-indigo-600">' + fmt$(blockNet) + '</span></div>';
      } else {
        h += '<div class="px-4 py-1.5 flex justify-between items-center text-sm bg-indigo-50 border-t border-indigo-100">';
        h += '<span class="text-indigo-600 font-medium">Total Due</span>';
        h += '<span class="font-bold text-indigo-600">' + fmt$(blockTotal) + '</span></div>';
      }
      h += '<div class="px-4 py-2 bg-green-50 flex justify-between items-center text-sm">';
      h += '<span class="text-green-700 font-medium">Paid on ' + fmtShort(block.pmtDt) + '</span>';
      h += '<div class="flex items-center gap-2">';
      h += '<span class="font-bold text-green-700">' + fmt$(block.pmtAmt) + '</span>';
      h += '<button onclick="event.stopPropagation();deletePayment(\'' + block.pmtDt + '\')" class="text-xs text-red-400 hover:text-red-600">delete</button>';
      h += '</div></div>';
    }
    h += '</div></div>';
  });
  h += '</div>';
  el.innerHTML = h;
}

function statCard(label, value, cls) {
  return '<div class="rounded-lg p-3 ' + cls + '"><div class="text-xs opacity-70">' + label + '</div><div class="text-lg font-bold">' + value + '</div></div>';
}

function startEdit(date) {
  editingDate = date; render();
  var panel = document.querySelector('[class*="border-indigo-500"]');
  if (panel) panel.scrollIntoView({behavior: 'smooth', block: 'nearest'});
}
function cancelEdit() { editingDate = null; render(); }

function onTimeChange() {
  var s = document.getElementById('ed-start').value;
  var e = document.getElementById('ed-end').value;
  if (s && e) {
    document.getElementById('ed-hours').value = calcHours(s, e);
  }
}

function onEditCatChange() {
  var cat = document.getElementById('ed-cat').value;
  var dy = findDay(editingDate); if (!dy) return;
  if (isAuto(cat)) {
    document.getElementById('ed-start').value = '';
    document.getElementById('ed-end').value = '';
    document.getElementById('ed-hours').value = DHRS[dy.w] || 8;
    document.getElementById('ed-addons').value = 0;

    document.getElementById('ed-start').value = '';
    document.getElementById('ed-end').value = '';

function saveDay() {
  var dy = findDay(editingDate); if (!dy) return;
  dy.c = document.getElementById('ed-cat').value;
  dy.s = document.getElementById('ed-start').value;
  dy.e = document.getElementById('ed-end').value;

  dy.a = parseFloat(document.getElementById('ed-addons').value) || 0;
  dy.n = document.getElementById('ed-notes').value;

}
function clearDay() {
  var dy = findDay(editingDate); if (!dy) return;
  var isWknd = (dy.w === 'Sat' || dy.w === 'Sun');
  dy.s = ''; dy.e = ''; dy.h = 0; dy.a = 0; dy.n = '';
  dy.c = isWknd ? '' : 'regular'; dy.st = ''; dy.pd = null;
  editingDate = null; render();
}

// ====== WEEK ACTIONS ======
function navWeek(dir) { curWeek = new Date(curWeek); curWeek.setDate(curWeek.getDate() + dir * 7); editingDate = null; payingWeek = false; render(); }
function goToday() { curWeek = getMon(new Date()); editingDate = null; payingWeek = false; render(); }
function toggleWeekend() { showWeekend = !showWeekend; render(); }
function toggleHist(k) { var e = document.getElementById('hw-' + k); if (e) e.classList.toggle('hidden'); }

function fillWeek() {
  // Only fill Mon-Fri (offset 2-6 from Saturday start)
  var weekDows = ['Mon','Tue','Wed','Thu','Fri'];
  for (var i = 0; i < 5; i++) {
    var dt = new Date(curWeek); dt.setDate(dt.getDate() + i + 2); // +2 to skip Sat,Sun
    var id = ds(dt); var dy = ensure(id, weekDows[i]);
    if (dy.st === '' && DTIMES[weekDows[i]]) {
      dy.s = DTIMES[weekDows[i]][0]; dy.e = DTIMES[weekDows[i]][1];
      dy.h = DHRS[weekDows[i]]; dy.a = TOLL; dy.c = 'regular';
      dy.st = 'unpaid';
    }
  }
  render();
}

function clearWeek() {
  var allDows = ['Sat','Sun','Mon','Tue','Wed','Thu','Fri'];
  var cleared = 0;
  for (var i = 0; i < 7; i++) {
    var dt = new Date(curWeek); dt.setDate(dt.getDate() + i);
    var dy = findDay(ds(dt));
    if (dy && dy.st !== 'paid') {
      var isWknd = (i < 2); // Sat=0, Sun=1
      dy.s = ''; dy.e = ''; dy.h = 0; dy.a = 0; dy.n = '';
      dy.c = isWknd ? '' : 'regular'; dy.st = ''; dy.pd = null;
      cleared++;
    }
  }
  editingDate = null; render();
}

// ====== PAY ======
function deletePayment(pdt) {
  // Revert all days paid on that date back to unpaid
  days.forEach(function(dy) {
    if (dy.pd === pdt) { dy.st = 'unpaid'; dy.pd = null; }
  });
  // Remove the payment record
  pmts = pmts.filter(function(p) { return p.dt !== pdt; });
  render();
}
function togglePayWeek() { payingWeek = !payingWeek; render(); }
function confirmPayment() {
  var dt = document.getElementById('pwDate').value;
  var amt = parseFloat(document.getElementById('pwAmt').value) || 0;
  if (!dt) { alert('Enter a payment date'); return; }
  // Mark ALL unpaid days as paid
  days.forEach(function(dy) {
    if (dy.st === 'unpaid') { dy.st = 'paid'; dy.pd = dt; }
  });
  if (amt > 0) pmts.push({id: 'p' + (pmts.length + 1), dt: dt, amt: amt});
  payingWeek = false; render();
}

// ====== BABYSITTER FIRESTORE ======
function saveBsToFirestore() {
  if (!currentUser) return;
  db.collection('data').doc('bsSitters').set({ items: JSON.stringify(bsSitters) });
  db.collection('data').doc('bsSessions').set({ items: JSON.stringify(bsSessions) });
}
function loadBsFromFirestore() {
  if (!currentUser) return;
  return Promise.all([
    db.collection('data').doc('bsSitters').get(),
    db.collection('data').doc('bsSessions').get()
  ]).then(function(docs) {
    if (docs[0].exists) { try { bsSitters = JSON.parse(docs[0].data().items); } catch(e) {} }
    if (docs[1].exists) { try { bsSessions = JSON.parse(docs[1].data().items); } catch(e) {} }
  }).catch(function(err) { console.log('BS Firestore load error:', err); });
}

// ====== BABYSITTER HELPERS ======
function bsGenId() { return 'bs' + Date.now() + Math.floor(Math.random() * 1000); }
function bsFindSitter(id) { for (var i = 0; i < bsSitters.length; i++) { if (bsSitters[i].id === id) return bsSitters[i]; } return null; }
function bsFindSession(id) { for (var i = 0; i < bsSessions.length; i++) { if (bsSessions[i].id === id) return bsSessions[i]; } return null; }
function bsCalcHours(start, end) {
  if (!start || !end) return 0;
  var s = start.split(':'), e = end.split(':');
  var mins = (parseInt(e[0]) * 60 + parseInt(e[1])) - (parseInt(s[0]) * 60 + parseInt(s[1]));
  return Math.max(0, Math.round(mins / 60 * 100) / 100);
}
function bsSessionTotal(sess) {
  var sitter = bsFindSitter(sess.sitterId);
  var rate = sitter ? sitter.rate : 0;
  var base = (sess.hours || 0) * rate;
  var addons = 0;
  if (sess.addons) sess.addons.forEach(function(a) { addons += (a.amt || 0); });
  return base + addons;
}
function bsUnpaidTotal() {
  var t = 0;
  bsSessions.forEach(function(s) { if (s.status !== 'paid') t += bsSessionTotal(s); });
  return t;
}

          // Expandable detail (cost breakdown + pay form)
          h += '<div id="bsd-' + sess.id + '" class="hidden border-t px-4 py-2 bg-gray-50 text-sm">';
          var sitterForSess = bsFindSitter(sess.sitterId);
          h += '<div class="text-gray-600">' + sess.hours + 'h × ' + fmt$((sitterForSess ? sitterForSess.rate : 0)) + '/hr = ' + fmt$(sess.hours * (sitterForSess ? sitterForSess.rate : 0)) + '</div>';
          if (sess.addons && sess.addons.length > 0) {
            sess.addons.forEach(function(a) {
              h += '<div class="text-gray-500">' + a.label + ': ' + fmt$(a.amt) + '</div>';
            });
          }
          if (isPaid) {
            h += '<div class="text-green-600 mt-1">Paid ' + fmt$(sess.paidAmt) + ' on ' + fmtShort(sess.paidDate) + '</div>';
          }
          h += '</div>';
          // Pay inline form (outside expandable, always visible when active)
          if (bsPayingSession === sess.id) {
            h += '<div class="border-t px-4 py-2 bg-green-50 flex flex-wrap gap-2 items-end">';
            h += '<div><label class="text-xs text-green-700 block">Date</label><input type="date" id="bsp-date" value="' + ds(new Date()) + '" class="px-2 py-1 border rounded text-sm"></div>';
            h += '<div><label class="text-xs text-green-700 block">Amount</label><input type="number" id="bsp-amt" step="0.01" value="' + tot.toFixed(2) + '" class="px-2 py-1 border rounded text-sm w-24"></div>';
            h += '<button onclick="bsConfirmPay(\'' + sess.id + '\')" class="px-3 py-1 bg-green-600 text-white rounded text-xs">Confirm</button>';
            h += '<button onclick="bsPayingSession=null;renderBabysitter()" class="px-3 py-1 bg-gray-300 text-gray-700 rounded text-xs">Cancel</button>';
            h += '</div>';
          }
          h += '</div>';
        });
        h += '</div>';
      }
      h += '</div>';
    }
  }

  el.innerHTML = h;
}

function renderBsSessionForm(sess, isNew) {
  var sitter = bsFindSitter(bsSelectedSitter);
  var h = '<div class="bg-green-50 rounded-lg p-4 mb-4 border border-green-200">';
  h += '<h3 class="font-medium text-green-800 mb-3">' + (isNew ? 'Log Session' : 'Edit Session') + '</h3>';
  h += '<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-3">';
  h += '<div><label class="text-xs text-green-700 block">Date</label><input id="bss-date" type="date" value="' + (sess.date || ds(new Date())) + '" class="px-2 py-1.5 border rounded text-sm w-full"></div>';
  h += '<div><label class="text-xs text-green-700 block">Start</label><input id="bss-start" type="time" value="' + (sess.start || '') + '" onchange="bsCalcForm()" class="px-2 py-1.5 border rounded text-sm w-full"></div>';
  h += '<div><label class="text-xs text-green-700 block">End</label><input id="bss-end" type="time" value="' + (sess.end || '') + '" onchange="bsCalcForm()" class="px-2 py-1.5 border rounded text-sm w-full"></div>';
  h += '<div><label class="text-xs text-green-700 block">Hours</label><input id="bss-hours" type="number" step="0.25" value="' + (sess.hours || 0) + '" class="px-2 py-1.5 border rounded text-sm w-full"></div>';
  h += '</div>';
  // Add-ons
  h += '<div class="mb-3"><label class="text-xs text-green-700 block mb-1">Add-ons</label>';
  h += '<div id="bss-addons" class="space-y-2">';
  if (sess.addons && sess.addons.length > 0) {
    sess.addons.forEach(function(a, i) {
      h += '<div class="flex gap-2 items-center">';
      h += '<input class="bss-addon-label px-2 py-1 border rounded text-sm w-32" value="' + (a.label || '') + '" placeholder="e.g. Dinner">';
      h += '<input class="bss-addon-amt px-2 py-1 border rounded text-sm w-20" type="number" step="0.01" value="' + (a.amt || 0) + '" placeholder="$">';
      h += '<button onclick="bsRemoveAddon(' + i + ')" class="text-red-400 hover:text-red-600 text-xs">remove</button>';
      h += '</div>';
    });
  }
  h += '</div>';
  h += '<button onclick="bsAddAddon()" class="mt-2 text-xs text-green-600 hover:text-green-800">+ Add item</button>';
  h += '</div>';
  // Preview
  var hrs = sess.hours || 0;
  var rate = sitter ? sitter.rate : 0;
  var addonsTotal = 0;
  if (sess.addons) sess.addons.forEach(function(a) { addonsTotal += (a.amt || 0); });
  h += '<div class="text-sm text-green-700 mb-3" id="bss-preview">' + hrs + 'h × ' + fmt$(rate) + ' + ' + fmt$(addonsTotal) + ' add-ons = <strong>' + fmt$(hrs * rate + addonsTotal) + '</strong></div>';
  h += '<div class="flex gap-2">';
  h += '<button onclick="bsSaveSession()" class="px-4 py-1.5 bg-green-600 text-white rounded text-sm hover:bg-green-700">Save</button>';
  h += '<button onclick="bsCancelSession()" class="px-4 py-1.5 bg-gray-300 text-gray-700 rounded text-sm">Cancel</button>';
  h += '</div></div>';
  return h;
}

// ====== BABYSITTER ACTIONS ======
function bsStartAddSitter() { bsEditingSitter = 'new'; renderBabysitter(); }
function bsCancelSitter() { bsEditingSitter = null; renderBabysitter(); }
function bsSaveSitter() {
  var name = document.getElementById('bs-name').value.trim();
  var rate = parseFloat(document.getElementById('bs-rate').value) || 0;
  if (!name) { alert('Enter a name'); return; }
  if (rate <= 0) { alert('Enter a valid rate'); return; }
  if (bsEditingSitter === 'new') {
    var s = {id: bsGenId(), name: name, rate: rate};
    bsSitters.push(s);
    bsSelectedSitter = s.id;
  } else {
    var s = bsFindSitter(bsEditingSitter);
    if (s) { s.name = name; s.rate = rate; }
  }
  bsEditingSitter = null;
  renderBabysitter();
}
function bsDeleteSitter(id) {
  if (!confirm('Delete this babysitter and all their sessions?')) return;
  bsSitters = bsSitters.filter(function(s) { return s.id !== id; });
  bsSessions = bsSessions.filter(function(s) { return s.sitterId !== id; });
  if (bsSelectedSitter === id) bsSelectedSitter = bsSitters.length > 0 ? bsSitters[0].id : null;
  bsEditingSitter = null;
  renderBabysitter();
}
function bsSelectSitter(id) {
  bsSelectedSitter = id;
  bsEditingSitter = null;
  bsEditingSession = null;
  bsPayingSession = null;
  renderBabysitter();
}

// Sessions
function bsStartAddSession() { bsEditingSession = 'new'; bsTempSession = null; renderBabysitter(); }
function bsCancelSession() { bsEditingSession = null; bsTempSession = null; renderBabysitter(); }
function bsCalcForm() {
  var s = document.getElementById('bss-start').value;
  var e = document.getElementById('bss-end').value;
  if (s && e) document.getElementById('bss-hours').value = bsCalcHours(s, e);
}
function bsCollectAddons() {
  var labels = document.querySelectorAll('.bss-addon-label');
  var amts = document.querySelectorAll('.bss-addon-amt');
  var addons = [];
  for (var i = 0; i < labels.length; i++) {
    var lbl = labels[i].value.trim();
    var amt = parseFloat(amts[i].value) || 0;
    if (lbl || amt > 0) addons.push({label: lbl || 'Add-on', amt: amt});
  }
  return addons;
}
function bsSnapshotForm() {
  // Capture current form state into bsTempSession (for new) or directly into session (for edit)
  var addons = bsCollectAddons();
  var snap = {
    date: document.getElementById('bss-date').value,
    start: document.getElementById('bss-start').value,
    end: document.getElementById('bss-end').value,
    hours: parseFloat(document.getElementById('bss-hours').value) || 0,
    addons: addons, status: 'unpaid'
  };
  if (bsEditingSession === 'new') {
    bsTempSession = snap;
  } else {
    var sess = bsFindSession(bsEditingSession);
    if (sess) { sess.date = snap.date; sess.start = snap.start; sess.end = snap.end; sess.hours = snap.hours; sess.addons = snap.addons; }
  }
  return snap;
}
function bsAddAddon() {
  var snap = bsSnapshotForm();
  snap.addons.push({label: '', amt: 0});
  if (bsEditingSession === 'new') bsTempSession = snap;
  renderBabysitter();
}
function bsRemoveAddon(idx) {
  var snap = bsSnapshotForm();
  snap.addons.splice(idx, 1);
  if (bsEditingSession === 'new') bsTempSession = snap;
  renderBabysitter();
}
function bsSaveSession() {
  var date = document.getElementById('bss-date').value;
  var start = document.getElementById('bss-start').value;
  var end = document.getElementById('bss-end').value;
  var hours = parseFloat(document.getElementById('bss-hours').value) || 0;
  var addons = bsCollectAddons();
  if (!date) { alert('Enter a date'); return; }
  if (hours <= 0) { alert('Enter hours'); return; }
  if (bsEditingSession === 'new') {
    bsSessions.push({
      id: bsGenId(), sitterId: bsSelectedSitter, date: date,
      start: start, end: end, hours: hours, addons: addons,
      status: 'unpaid', paidDate: null, paidAmt: 0
    });
  } else {
    var sess = bsFindSession(bsEditingSession);
    if (sess) {
      sess.date = date; sess.start = start; sess.end = end;
      sess.hours = hours; sess.addons = addons;
    }
  }
  bsEditingSession = null;
  bsTempSession = null;
  renderBabysitter();
}
function bsDeleteSession(id) {
  if (!confirm('Delete this session?')) return;
  bsSessions = bsSessions.filter(function(s) { return s.id !== id; });
  renderBabysitter();
}
function bsToggleDetail(id) {
  var el = document.getElementById('bsd-' + id);
  if (el) el.classList.toggle('hidden');
}
function bsStartPaySession(id) { bsPayingSession = id; renderBabysitter(); }
function bsConfirmPay(id) {
  var sess = bsFindSession(id);
  if (!sess) return;
  var date = document.getElementById('bsp-date').value;
  var amt = parseFloat(document.getElementById('bsp-amt').value) || 0;
  if (!date) { alert('Enter payment date'); return; }
  sess.status = 'paid';
  sess.paidDate = date;
  sess.paidAmt = amt;
  bsPayingSession = null;
  renderBabysitter();
}

</script>

}
