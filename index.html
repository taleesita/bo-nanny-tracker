<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 min-h-screen">

<header class="bg-white border-b border-indigo-100 sticky top-0 z-50">
  <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
    <h1 class="text-xl font-bold text-indigo-600">Nanny Payment Tracker</h1>
    <div class="relative">
      <button onclick="toggleGearMenu()" id="gearBtn" class="text-gray-400 hover:text-indigo-600 text-xl" title="Settings">&#9881;</button>
      <div id="gearMenu" class="hidden absolute right-0 top-10 bg-white border rounded-lg shadow-lg py-2 w-56 z-50">
        <div id="gearUser" class="px-4 py-2 text-xs text-gray-400 border-b">Not signed in</div>
        <button onclick="toggleSettings();toggleGearMenu()" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 flex items-center gap-2">&#9881; Day Types</button>
        <button id="gearSignOut" onclick="doSignOut();toggleGearMenu()" class="hidden w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-red-50">Sign out</button>
      </div>
    </div>
  </div>
</header>

<div id="appContent" style="display:none">
<div id="settingsPanel" class="hidden bg-white border-b shadow-sm">
  <div class="max-w-5xl mx-auto px-4 py-4">
    <h3 class="font-bold text-gray-800 mb-3">Manage Day Types</h3>
    <div id="catList" class="space-y-2 mb-3"></div>
    <div class="flex flex-wrap gap-2 items-end border-t pt-3 mt-3">
      <div><label class="text-xs text-gray-500 block">Key</label><input id="newCatKey" placeholder="e.g. sick" class="px-2 py-1.5 border rounded text-sm w-24"></div>
      <div><label class="text-xs text-gray-500 block">Label</label><input id="newCatLabel" placeholder="e.g. Sick Day" class="px-2 py-1.5 border rounded text-sm w-32"></div>
      <div><label class="text-xs text-gray-500 block">Calculation</label>
        <select id="newCatCalc" class="px-2 py-1.5 border rounded text-sm">
          <option value="auto">Auto (default hrs x $30)</option>
          <option value="manual">Manual (hrs x $30 + add-ons)</option>
        </select>
      </div>
      <button onclick="addCategory()" class="px-4 py-1.5 bg-indigo-600 text-white rounded text-sm hover:bg-indigo-700">Add</button>
    </div>
  </div>
</div>

<nav class="bg-white border-b border-indigo-100">
  <div class="max-w-5xl mx-auto px-4 flex gap-6">
    <button class="tab py-3 text-sm tab-active" onclick="switchTab('week')">This Week</button>
    <button class="tab py-3 text-sm text-gray-500" onclick="switchTab('history')">History</button>
  </div>
</nav>

<div class="bg-gradient-to-r from-indigo-600 to-purple-700 text-white">

  </div>
</div>

// Close gear menu when clicking outside
document.addEventListener('click', function(e) {
  var menu = document.getElementById('gearMenu');
  var btn = document.getElementById('gearBtn');
  if (menu && !menu.classList.contains('hidden') && !menu.contains(e.target) && e.target !== btn) {
    menu.classList.add('hidden');
  }

function doSignIn() {
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function(err) { alert(err.message); });
}

function doSignOut() {
  auth.signOut();
}

auth.onAuthStateChanged(function(user) {
  if (user) {
    if (ALLOWED_EMAILS.indexOf(user.email) < 0) {
      auth.signOut();
      alert('Access denied. Only authorized users can sign in.');
      return;
    }
    currentUser = user;
    document.getElementById('gearUser').textContent = user.email;
    document.getElementById('gearSignOut').classList.remove('hidden');
    showApp();
    loadFromFirestore();
  } else {
    currentUser = null;
    document.getElementById('gearUser').textContent = 'Not signed in';
    document.getElementById('gearSignOut').classList.add('hidden');
    showLogin();
  }
});

// ====== FIRESTORE SYNC ======
function saveToFirestore() {
  if (!currentUser) return;
  db.collection('data').doc('days').set({ items: JSON.stringify(days) });
  db.collection('data').doc('payments').set({ items: JSON.stringify(pmts) });
  db.collection('data').doc('categories').set({ items: JSON.stringify(CATS) });
}

function loadFromFirestore() {
  if (!currentUser) return;
  Promise.all([
    db.collection('data').doc('days').get(),
    db.collection('data').doc('payments').get(),
    db.collection('data').doc('categories').get()
  ]).then(function(docs) {
    if (docs[0].exists) {
      try { days = JSON.parse(docs[0].data().items); } catch(e) {}
    }
    if (docs[1].exists) {
      try { pmts = JSON.parse(docs[1].data().items); } catch(e) {}
    }
    if (docs[2].exists) {
      try { CATS = JSON.parse(docs[2].data().items); } catch(e) {}
    }
    render();
  }).catch(function(err) {
    console.log('Firestore load error (using local data):', err);
    render();
  });
}

// ====== HELPERS ======
// Payment weeks run Sat-Fri: weekend work belongs to the NEXT Mon-Fri week
// getMon returns the Saturday that starts the payment week
function getMon(dt) {
  var d = new Date(dt); var day = d.getDay();
  // day: 0=Sun,1=Mon,...,5=Fri,6=Sat
  // daysSinceSat: Sat=0, Sun=1, Mon=2, Tue=3, Wed=4, Thu=5, Fri=6
  var diff = (day + 1) % 7;
  d.setDate(d.getDate() - diff);
  d.setHours(0,0,0,0); return d;
}
function ds(dt) { return dt.toISOString().split('T')[0]; }

var DAYNAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var DAYLONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// "Mon 4/6" format
function fmtCard(s) {
  var dt = new Date(s + 'T12:00:00');
  return DAYLONG[dt.getDay()] + ', ' + (dt.getMonth()+1) + '/' + dt.getDate();
}
// "4/6" compact
function fmtShort(s) {
  var p = s.split('-');
  return (+p[1]) + '/' + parseInt(p[2]);
}
// "Fri, 3/27" for payment history
function fmtPayDate(s) {
  var dt = new Date(s + 'T12:00:00');
  return DAYNAMES[dt.getDay()] + ' ' + (dt.getMonth()+1) + '/' + dt.getDate() + '/' + dt.getFullYear().toString().slice(2);
}

function fmtTime(t) {
  if (!t) return '';
  var parts = t.split(':');
  var h = parseInt(parts[0]), m = parseInt(parts[1]);
  var ampm = h >= 12 ? 'pm' : 'am';
  h = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  if (m > 0) return h + ':' + (m < 10 ? '0' : '') + m + ampm;
  return h + ampm;
}
function fmtHours(dy) {
  if (!dy.s && !dy.e) return '';
  return fmtTime(dy.s) + '\u2013' + fmtTime(dy.e) + ' (' + dy.h + 'h)';
}
function fmtWeekRange(sat) {
  // sat is the Saturday start; show Mon-Fri range
  var m = new Date(sat); m.setDate(m.getDate() + 2); // Monday
  var f = new Date(sat); f.setDate(f.getDate() + 6); // Friday
  return fmtShort(ds(m)) + ' \u2013 ' + fmtShort(ds(f)) + ', ' + f.getFullYear();
}
function getMonFromSat(sat) {
  var m = new Date(sat); m.setDate(m.getDate() + 2); return m;
}
function fmt$(amt) { return '$' + amt.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function fmt$int(amt) { return '$' + Math.round(amt).toLocaleString(); }

function calcHours(start, end) {
  if (!start || !end) return 0;
  var s = start.split(':'), e = end.split(':');
  var sh = parseInt(s[0]) + parseInt(s[1]) / 60;
  var eh = parseInt(e[0]) + parseInt(e[1]) / 60;
  var diff = eh - sh;
  return Math.round(diff * 4) / 4; // quarter-hour precision
}

function isAuto(catKey) { var c = CATS[catKey]; return c && c.calc === 'auto'; }
function catLabel(key) { var c = CATS[key]; return c ? c.label : key; }
function catColor(key) { var c = CATS[key]; return c ? c.color : 'bg-gray-100 text-gray-700'; }

function dayTotal(dy) {
  if (!dy || dy.st === '') return 0;
  if (isAuto(dy.c)) return RATE * (DHRS[dy.w] || 8);
  return RATE * (dy.h || 0) + (dy.a || 0);
}

function findDay(date) { return days.find(function(x) { return x.d === date; }); }
function ensure(date, dow) {
  var dy = findDay(date);
  if (!dy) {
    var isWknd = (dow === 'Sat' || dow === 'Sun');
    dy = {d:date, w:dow, s:'', e:'', h:0, a:0, n:'', c: isWknd ? '' : 'regular', st:'', pd:null};
    days.push(dy);
  }
  return dy;
}
function unpaidTotal() { var t = 0; days.forEach(function(d) { if (d.st === 'unpaid') t += dayTotal(d); }); return t; }
function paidTotal() { var t = 0; pmts.forEach(function(p) { t += p.amt; }); return t; }
function unpaidDays() { return days.filter(function(d) { return d.st === 'unpaid'; }); }

// Count days per payment date
function daysForPayment(pdt) {
  return days.filter(function(d) { return d.pd === pdt && d.st === 'paid'; }).length;
}

// ====== RENDER ======
function switchTab(tab) {
  curView = tab; editingDate = null; payingWeek = false;
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.className = 'tab py-3 text-sm text-gray-500';
    if ((tab === 'week' && i === 0) || (tab === 'history' && i === 1))
      t.className = 'tab py-3 text-sm tab-active';
  });
  render();
}
function render() {
  saveToFirestore();
  document.getElementById('sDue').textContent = fmt$(unpaidTotal());
  document.getElementById('sPaid').textContent = fmt$(paidTotal());
  document.getElementById('sUnpaid').textContent = unpaidDays().length;
  var m = document.getElementById('main');
  if (curView === 'week') renderWeek(m);
  else renderHist(m);
}

function renderWeek(el) {
  // Week runs Sat-Fri; curWeek is the Saturday
  var allDows = ['Sat','Sun','Mon','Tue','Wed','Thu','Fri'];
  var wkDays = [];
  for (var i = 0; i < 7; i++) {
    var dt = new Date(curWeek); dt.setDate(dt.getDate() + i);
    var id = ds(dt);
    var dy = ensure(id, allDows[i]);
    var isWknd = (i < 2); // Sat=0, Sun=1
    if (!isWknd || showWeekend || dy.st !== '') wkDays.push(dy);
  }
  var wt = 0; wkDays.forEach(function(d) { wt += dayTotal(d); });
  var weekUnpaid = wkDays.filter(function(d) { return d.st === 'unpaid'; });
  var weekUnpaidTotal = 0; weekUnpaid.forEach(function(d) { weekUnpaidTotal += dayTotal(d); });

  var h = '';
  // Nav
  h += '<div class="flex items-center justify-between mb-3 flex-wrap gap-2">';
  h += '<button onclick="navWeek(-1)" class="px-3 py-1.5 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700">&#9664; Prev</button>';
  h += '<span class="font-semibold text-gray-700">' + fmtWeekRange(curWeek) + '</span>';
  h += '<div class="flex gap-2">';
  h += '<button onclick="navWeek(1)" class="px-3 py-1.5 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700">Next &#9654;</button>';
  h += '<button onclick="goToday()" class="px-3 py-1.5 bg-purple-600 text-white text-sm rounded-lg hover:bg-purple-700">Today</button>';
  h += '</div></div>';

  // Check if there are clearable days (unpaid or empty, not paid)
  var hasClearable = wkDays.some(function(d) { return d.st !== 'paid' && (d.h > 0 || d.st === 'unpaid' || d.a !== 0 || d.n); });
  var hasFillable = wkDays.some(function(d) { return d.st === '' && DTIMES[d.w]; });

  // Actions left, weekend toggle right
  h += '<div class="flex items-center justify-between mb-3 flex-wrap gap-2">';
  h += '<div class="flex gap-2">';
  if (hasFillable) {
    h += '<button onclick="fillWeek()" class="px-3 py-1.5 bg-purple-600 text-white text-xs rounded-lg hover:bg-purple-700">Fill Default Week</button>';
  } else {
    h += '<button class="px-3 py-1.5 bg-purple-300 text-white text-xs rounded-lg cursor-not-allowed" title="No empty weekdays to fill">Fill Default Week</button>';
  }
  if (hasClearable) {
    h += '<button onclick="clearWeek()" class="px-3 py-1.5 bg-gray-400 text-white text-xs rounded-lg hover:bg-gray-500">Clear Week</button>';
  } else {
    h += '<button class="px-3 py-1.5 bg-gray-200 text-gray-400 text-xs rounded-lg cursor-not-allowed" title="Nothing to clear (all days are paid)">Clear Week</button>';
  }
  h += '</div>';
  h += '<button onclick="toggleWeekend()" class="flex items-center gap-2 text-sm text-gray-500 cursor-pointer select-none">';
  h += '<span>Weekend</span>';
  h += '<div class="w-10 h-5 rounded-full relative transition-colors ' + (showWeekend ? 'bg-indigo-600' : 'bg-gray-300') + '">';
  h += '<div class="w-4 h-4 bg-white rounded-full absolute top-0.5 transition-all shadow ' + (showWeekend ? 'left-5' : 'left-0.5') + '"></div>';
  h += '</div></button>';
  h += '</div>';

  // Cards - use CSS Grid with subgrid-like fixed rows
  var cols = wkDays.length <= 5 ? 'lg:grid-cols-5' : (wkDays.length <= 6 ? 'lg:grid-cols-6' : 'lg:grid-cols-7');
  h += '<div class="grid grid-cols-2 sm:grid-cols-3 ' + cols + ' gap-3 mb-4" style="align-items:stretch">';
  wkDays.forEach(function(dy) { h += renderDayCard(dy); });
  h += '</div>';

  // Inline edit panel
  if (editingDate) {
    var edy = findDay(editingDate);
    if (edy) h += renderEditPanel(edy);
  }

  // Pay Week
  if (weekUnpaid.length > 0) {
    h += '<div class="bg-green-50 rounded-lg p-4 mb-4 border border-green-200">';
    h += '<div class="flex items-center justify-between flex-wrap gap-2">';
    h += '<div><span class="font-medium text-green-800">' + weekUnpaid.length + ' unpaid day(s)</span>';
    h += ' <span class="text-green-700 font-bold">' + fmt$(weekUnpaidTotal) + '</span></div>';
    h += '<button onclick="togglePayWeek()" class="px-4 py-2 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700">Pay This Week</button>';
    h += '</div>';
    if (payingWeek) {
      h += '<div class="mt-3 pt-3 border-t border-green-200 flex flex-wrap gap-3 items-end">';
      h += '<div><label class="text-xs text-green-700 block">Date</label><input type="date" id="pwDate" value="' + ds(new Date()) + '" class="px-2 py-1.5 border rounded text-sm"></div>';
      h += '<div><label class="text-xs text-green-700 block">Amount</label><input type="number" id="pwAmt" step="0.01" value="' + weekUnpaidTotal.toFixed(2) + '" class="px-2 py-1.5 border rounded text-sm w-28"></div>';
      h += '<button onclick="confirmPayWeek()" class="px-4 py-1.5 bg-green-700 text-white rounded text-sm">Confirm</button>';
      h += '<button onclick="payingWeek=false;render()" class="px-4 py-1.5 bg-gray-300 text-gray-700 rounded text-sm">Cancel</button>';
      h += '</div>';
    }
    h += '</div>';
  }

  // Week total
  h += '<div class="bg-white rounded-lg p-3 shadow-sm border-t-4 border-indigo-600 inline-block">';
  h += '<span class="text-sm text-gray-500">Week Total: </span>';
  h += '<span class="text-lg font-bold text-indigo-600">' + fmt$(wt) + '</span></div>';

  el.innerHTML = h;
}

function renderDayCard(dy) {
  var tot = dayTotal(dy);
  var addons = isAuto(dy.c) ? 0 : (dy.a || 0);
  var isEmpty = (dy.st === '');
  var bdr = dy.st === 'paid' ? 'border-green-400' : dy.st === 'unpaid' ? 'border-amber-400' : 'border-gray-200';
  var isEditing = (editingDate === dy.d);
  var clickable = (dy.st !== 'paid' && !isEditing);

  var h = '<div class="border-l-4 ' + bdr + ' bg-white rounded-lg p-3 shadow-sm flex flex-col';
  if (isEditing) h += ' ring-2 ring-indigo-400';
  if (clickable) h += ' cursor-pointer hover:shadow-md';
  h += '"';
  if (clickable) h += ' onclick="startEdit(\'' + dy.d + '\')"';
  h += '>';

  // ROW 1: Date + badge (fixed height)
  h += '<div class="card-row justify-between">';
  h += '<span class="font-semibold text-xs text-gray-700">' + fmtCard(dy.d) + '</span>';
  if (dy.st === 'paid') {
    h += '<span class="chip bg-green-100 text-green-700">Paid ' + fmtShort(dy.pd) + '</span>';
  } else if (dy.st === 'unpaid') {
    h += '<span class="chip bg-amber-100 text-amber-700">Unpaid</span>';
  } else {
    h += '<span class="chip bg-gray-100 text-gray-400">Empty</span>';
  }
  h += '</div>';

  // ROW 2: Category chip (fixed height)
  h += '<div class="card-row mt-1" style="min-height:24px">';
  if (dy.c && CATS[dy.c] && !isEmpty) {
    h += '<span class="chip ' + catColor(dy.c) + '">' + catLabel(dy.c) + '</span>';
  }
  h += '</div>';

  // ROW 3: Hours (fixed height)
  h += '<div class="card-row text-xs text-gray-500">';
  if (dy.s && dy.e) {
    h += fmtHours(dy);
  } else if (isAuto(dy.c) && !isEmpty) {
    h += (DHRS[dy.w] || 8) + 'h (default)';
  }
  h += '</div>';

  // SPACER
  h += '<div class="flex-grow"></div>';

  // ROW 4: Breakdown (fixed)
  h += '<div class="card-row text-xs text-gray-400 border-t mt-2 pt-1">';
  if (!isEmpty) {
    if (isAuto(dy.c)) {
      h += (DHRS[dy.w] || 8) + 'h &times; $' + RATE;
    } else if (dy.h > 0) {
      h += dy.h + 'h &times; $' + RATE;
      if (addons > 0) h += ' + $' + addons;
      else if (addons < 0) h += ' \u2013 $' + Math.abs(addons);
    }
  }
  h += '</div>';

  // ROW 5: Total (fixed)
  h += '<div class="card-row"><span class="text-base font-bold text-indigo-600">' + fmt$(tot) + '</span></div>';

  // ROW 6: Notes (fixed)
  h += '<div class="card-row text-xs text-gray-400 italic" style="min-height:16px">' + (dy.n || '') + '</div>';

  h += '</div>';
  return h;
}

function renderEditPanel(dy) {
  // For empty weekdays, prefill defaults
  var edStart = dy.s || '';
  var edEnd = dy.e || '';
  var edHours = dy.h || 0;
  var edAddons = dy.a || 0;
  var edCat = dy.c || 'regular';
  if (dy.st === '' && !dy.s && DTIMES[dy.w]) {
    edStart = DTIMES[dy.w][0];
    edEnd = DTIMES[dy.w][1];
    edHours = DHRS[dy.w] || 8;
    edAddons = TOLL;
    edCat = 'regular';
  }

  var h = '<div class="bg-white rounded-lg p-4 shadow-sm mb-4 border-l-4 border-indigo-500">';
  h += '<div class="flex justify-between items-center mb-3">';
  h += '<h3 class="font-bold text-gray-800">Editing: ' + fmtCard(dy.d) + '</h3>';
  h += '<button onclick="cancelEdit()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>';
  h += '</div>';
  // Category (full width)
  h += '<div class="mb-3"><label class="text-xs font-medium text-gray-600 block mb-1">Category</label>';
  h += '<select id="ed-cat" class="w-full px-2 py-2 border rounded-lg text-sm" onchange="onEditCatChange()">';
  Object.keys(CATS).forEach(function(k) {
    h += '<option value="' + k + '"' + (edCat === k ? ' selected' : '') + '>' + CATS[k].label + '</option>';
  });
  h += '</select></div>';
  // Start + End (stacked on mobile, side by side on larger)
  h += '<div class="flex flex-col sm:flex-row gap-3 mb-3">';
  h += '<div class="flex-1"><label class="text-xs font-medium text-gray-600 block mb-1">Start</label>';
  h += '<input type="time" id="ed-start" value="' + edStart + '" class="w-full px-2 py-2 border rounded-lg text-sm" oninput="onTimeChange()"></div>';
  h += '<div class="flex-1"><label class="text-xs font-medium text-gray-600 block mb-1">End</label>';
  h += '<input type="time" id="ed-end" value="' + edEnd + '" class="w-full px-2 py-2 border rounded-lg text-sm" oninput="onTimeChange()"></div>';
  h += '</div>';
  // Hours + Add-ons (side by side)
  h += '<div class="grid grid-cols-2 gap-3">';
  h += '<div><label class="text-xs font-medium text-gray-600 block mb-1">Hours</label>';
  h += '<input type="number" id="ed-hours" step="0.25" value="' + edHours + '" class="w-full px-2 py-2 border rounded-lg text-sm"></div>';
  h += '<div><label class="text-xs font-medium text-gray-600 block mb-1">Add-ons ($)</label>';
  h += '<input type="number" id="ed-addons" step="0.01" value="' + edAddons + '" class="w-full px-2 py-2 border rounded-lg text-sm"></div>';
  h += '</div>';
  // Notes row
  h += '<div class="mt-2"><label class="text-xs font-medium text-gray-600 block mb-1">Notes</label>';
  h += '<input type="text" id="ed-notes" value="' + (dy.n || '').replace(/"/g, '&quot;') + '" class="w-full px-2 py-2 border rounded-lg text-sm" placeholder="Optional"></div>';
  // Buttons
  h += '<div class="flex flex-wrap gap-2 mt-3">';
  h += '<button onclick="saveDay()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">Save as Unpaid</button>';
  h += '<button onclick="clearDay()" class="px-4 py-2 bg-red-500 text-white rounded-lg text-sm hover:bg-red-600">Clear Day</button>';
  h += '<button onclick="cancelEdit()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm">Cancel</button>';
  h += '</div></div>';
  return h;
}

function renderHist(el) {
  // Dashboard stats
  var catCounts = {}; var totalDays = 0;
  days.forEach(function(d) {
    if (d.st === '' || d.d.indexOf('-bonus') >= 0) return;
    catCounts[d.c] = (catCounts[d.c] || 0) + 1;
    totalDays++;
  });

  var h = '';
  // Stats
  h += '<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-6">';
  h += statCard('Total Days', totalDays, 'bg-indigo-50 text-indigo-700');
  h += statCard('Total Paid', fmt$int(paidTotal()), 'bg-green-50 text-green-700');
  Object.keys(CATS).forEach(function(k) {
    if (catCounts[k]) h += statCard(CATS[k].label, catCounts[k] + ' days', catColor(k));
  });
  h += '</div>';

  // Build week groups
  var groups = {};
  days.forEach(function(d) {
    if (d.d.indexOf('-bonus') >= 0 || d.st === '') return;
    var mon = ds(getMon(new Date(d.d + 'T12:00:00')));
    if (!groups[mon]) groups[mon] = [];
    groups[mon].push(d);
  });

  // Build payment lookup: paymentDate -> {amt, days}
  var pmtByDate = {};
  pmts.forEach(function(p) { pmtByDate[p.dt] = p.amt; });

  // Match weeks to payments: find the payment associated with each week
  function weekPayment(wk) {
    // Find the most common pd (payment date) among the week's days
    var pdCounts = {};
    wk.forEach(function(d) {
      if (d.pd) pdCounts[d.pd] = (pdCounts[d.pd] || 0) + 1;
    });
    var bestPd = null, bestCount = 0;
    Object.keys(pdCounts).forEach(function(pd) {
      if (pdCounts[pd] > bestCount) { bestPd = pd; bestCount = pdCounts[pd]; }
    });
    if (bestPd && pmtByDate[bestPd]) return {dt: bestPd, amt: pmtByDate[bestPd]};
    return null;
  }

  var keys = Object.keys(groups).sort().reverse();
  h += '<div class="space-y-2">';
  keys.forEach(function(k) {
    var wk = groups[k];
    var tot = 0; wk.forEach(function(d) { tot += dayTotal(d); });
    var allPaid = wk.every(function(d) { return d.st === 'paid'; });
    var pmt = weekPayment(wk);

    h += '<div class="bg-white rounded-lg shadow-sm overflow-hidden">';
    h += '<div class="px-4 py-2.5 flex justify-between items-center cursor-pointer hover:bg-indigo-50" onclick="toggleHist(\'' + k + '\')">';
    // Left side: week label + day count + badge
    h += '<div class="flex items-center gap-2">';
    var monDt = new Date(k + 'T12:00:00'); monDt.setDate(monDt.getDate() + 2);
    h += '<span class="font-medium text-sm text-gray-800">Wk of ' + fmtShort(ds(monDt)) + '</span>';
    h += '<span class="text-xs text-gray-400">' + wk.length + ' days</span>';
    if (allPaid) {
      h += '<span class="chip bg-green-100 text-green-700">Paid</span>';
    } else {
      h += '<span class="chip bg-amber-100 text-amber-700">Unpaid</span>';
    }
    h += '</div>';
    // Right side: payment amount or week total
    h += '<div class="text-right">';
    if (pmt) {
      h += '<span class="font-bold text-sm text-indigo-600">' + fmt$(pmt.amt) + '</span>';
      h += '<span class="text-xs text-gray-400 ml-2">paid ' + fmtShort(pmt.dt) + '</span>';
    } else {
      h += '<span class="font-medium text-sm text-indigo-600">' + fmt$(tot) + '</span>';
    }
    h += '</div></div>';

    // Expandable detail
    h += '<div id="hw-' + k + '" class="hidden border-t">';
    wk.forEach(function(d) {
      h += '<div class="px-4 py-1.5 flex justify-between items-center text-sm border-b border-gray-50">';
      h += '<div class="flex items-center gap-2"><span class="text-gray-600">' + fmtShort(d.d) + '</span>';
      if (d.c && CATS[d.c]) h += '<span class="chip ' + catColor(d.c) + '">' + catLabel(d.c) + '</span>';
      if (d.s && d.e) h += '<span class="text-xs text-gray-400">' + fmtTime(d.s) + '\u2013' + fmtTime(d.e) + '</span>';
      h += '</div><span class="font-medium text-indigo-600">' + fmt$(dayTotal(d)) + '</span></div>';
    });
    // If payment exists, show summary row at bottom
    if (pmt) {
      h += '<div class="px-4 py-2 bg-green-50 flex justify-between items-center text-sm">';
      h += '<span class="text-green-700 font-medium">Payment on ' + fmtShort(pmt.dt) + '</span>';
      h += '<span class="font-bold text-green-700">' + fmt$(pmt.amt) + '</span></div>';
    }
    h += '</div></div>';
  });
  h += '</div>';
  el.innerHTML = h;
}

function statCard(label, value, cls) {
  return '<div class="rounded-lg p-3 ' + cls + '"><div class="text-xs opacity-70">' + label + '</div><div class="text-lg font-bold">' + value + '</div></div>';
}

// ====== EDIT ======
function startEdit(date) {
  editingDate = date; render();
  var panel = document.querySelector('[class*="border-indigo-500"]');
  if (panel) panel.scrollIntoView({behavior: 'smooth', block: 'nearest'});
}
function cancelEdit() { editingDate = null; render(); }

function onTimeChange() {
  var s = document.getElementById('ed-start').value;
  var e = document.getElementById('ed-end').value;
  if (s && e) {
    document.getElementById('ed-hours').value = calcHours(s, e);
  }
}

function onEditCatChange() {
  var cat = document.getElementById('ed-cat').value;
  var dy = findDay(editingDate); if (!dy) return;
  if (isAuto(cat)) {
    document.getElementById('ed-start').value = '';
    document.getElementById('ed-end').value = '';
    document.getElementById('ed-hours').value = DHRS[dy.w] || 8;
    document.getElementById('ed-addons').value = 0;
  } else if (cat === 'regular') {
    var dt = DTIMES[dy.w];
    document.getElementById('ed-start').value = dt ? dt[0] : '09:00';
    document.getElementById('ed-end').value = dt ? dt[1] : '17:00';
    document.getElementById('ed-hours').value = DHRS[dy.w] || 8;
    document.getElementById('ed-addons').value = TOLL;
  } else {
    document.getElementById('ed-start').value = '';
    document.getElementById('ed-end').value = '';
    document.getElementById('ed-addons').value = 0;
  }
}

function saveDay() {
  var dy = findDay(editingDate); if (!dy) return;
  dy.c = document.getElementById('ed-cat').value;
  dy.s = document.getElementById('ed-start').value;
  dy.e = document.getElementById('ed-end').value;
  dy.h = parseFloat(document.getElementById('ed-hours').value) || 0;
  dy.a = parseFloat(document.getElementById('ed-addons').value) || 0;
  dy.n = document.getElementById('ed-notes').value;
  dy.st = 'unpaid'; dy.pd = null;
  editingDate = null; render();
}
function clearDay() {
  var dy = findDay(editingDate); if (!dy) return;
  var isWknd = (dy.w === 'Sat' || dy.w === 'Sun');
  dy.s = ''; dy.e = ''; dy.h = 0; dy.a = 0; dy.n = '';
  dy.c = isWknd ? '' : 'regular'; dy.st = ''; dy.pd = null;
  editingDate = null; render();
}

// ====== WEEK ACTIONS ======
function navWeek(dir) { curWeek = new Date(curWeek); curWeek.setDate(curWeek.getDate() + dir * 7); editingDate = null; payingWeek = false; render(); }
function goToday() { curWeek = getMon(new Date()); editingDate = null; payingWeek = false; render(); }
function toggleWeekend() { showWeekend = !showWeekend; render(); }
function toggleHist(k) { var e = document.getElementById('hw-' + k); if (e) e.classList.toggle('hidden'); }

function fillWeek() {
  // Only fill Mon-Fri (offset 2-6 from Saturday start)
  var weekDows = ['Mon','Tue','Wed','Thu','Fri'];
  for (var i = 0; i < 5; i++) {
    var dt = new Date(curWeek); dt.setDate(dt.getDate() + i + 2); // +2 to skip Sat,Sun
    var id = ds(dt); var dy = ensure(id, weekDows[i]);
    if (dy.st === '' && DTIMES[weekDows[i]]) {
      dy.s = DTIMES[weekDows[i]][0]; dy.e = DTIMES[weekDows[i]][1];
      dy.h = DHRS[weekDows[i]]; dy.a = TOLL; dy.c = 'regular';
      dy.st = 'unpaid';
    }
  }
  render();
}

function clearWeek() {
  var allDows = ['Sat','Sun','Mon','Tue','Wed','Thu','Fri'];
  var cleared = 0;
  for (var i = 0; i < 7; i++) {
    var dt = new Date(curWeek); dt.setDate(dt.getDate() + i);
    var dy = findDay(ds(dt));
    if (dy && dy.st !== 'paid') {
      var isWknd = (i < 2); // Sat=0, Sun=1
      dy.s = ''; dy.e = ''; dy.h = 0; dy.a = 0; dy.n = '';
      dy.c = isWknd ? '' : 'regular'; dy.st = ''; dy.pd = null;
      cleared++;
    }
  }
  editingDate = null; render();
}

// ====== PAY ======
function togglePayWeek() { payingWeek = !payingWeek; render(); }
function confirmPayWeek() {
  var dt = document.getElementById('pwDate').value;
  var amt = parseFloat(document.getElementById('pwAmt').value) || 0;
  if (!dt || amt <= 0) { alert('Enter date and amount'); return; }
  for (var i = 0; i < 7; i++) { // Sat-Fri
    var d = new Date(curWeek); d.setDate(d.getDate() + i);
    var dy = findDay(ds(d));
    if (dy && dy.st === 'unpaid') { dy.st = 'paid'; dy.pd = dt; }
  }
  pmts.push({id: 'p' + (pmts.length + 1), dt: dt, amt: amt});
  payingWeek = false; render();
}

// ====== SETTINGS ======
function toggleSettings() {
  var p = document.getElementById('settingsPanel');
  p.classList.toggle('hidden');
  if (!p.classList.contains('hidden')) renderCatList();
}
function renderCatList() {
  var el = document.getElementById('catList');
  var h = '';
  Object.keys(CATS).forEach(function(k) {
    var c = CATS[k];
    h += '<div class="flex items-center gap-2 py-1">';
    h += '<span class="chip ' + c.color + '">' + c.label + '</span>';
    h += '<span class="text-xs text-gray-400">(' + c.calc + ')</span>';
    h += '<button onclick="removeCategory(\'' + k + '\')" class="text-xs text-red-400 hover:text-red-600 ml-auto">remove</button>';
    h += '</div>';
  });
  el.innerHTML = h;
}
function addCategory() {
  var key = document.getElementById('newCatKey').value.trim().toLowerCase().replace(/\s+/g, '-');
  var label = document.getElementById('newCatLabel').value.trim();
  var calc = document.getElementById('newCatCalc').value;
  if (!key || !label) { alert('Enter key and label'); return; }
  if (CATS[key]) { alert('Key already exists'); return; }
  var colors = ['bg-teal-100 text-teal-700','bg-rose-100 text-rose-700','bg-lime-100 text-lime-700','bg-sky-100 text-sky-700','bg-fuchsia-100 text-fuchsia-700'];
  CATS[key] = {label: label, color: colors[Object.keys(CATS).length % colors.length], calc: calc};
  document.getElementById('newCatKey').value = '';
  document.getElementById('newCatLabel').value = '';
  renderCatList();
}
function removeCategory(key) {
  if (!confirm('Remove "' + CATS[key].label + '"?')) return;
  delete CATS[key]; renderCatList();
}

// ====== INIT ======
// render() is called by auth.onAuthStateChanged after login
</script>
